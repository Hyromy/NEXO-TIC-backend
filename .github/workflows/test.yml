name: Django Tests

on:
  push:
    branches: [ dev, main ]
  
  pull_request:
    branches: [ dev, main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Run Django Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests
        run: python manage.py test apps

      - name: Test Summary
        if: always()
        run: echo "Tests completed. Check results above."
