<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NexoTic{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header {
            background-color: #1a73e8;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            color: #ffffff;
            margin: 0;
            font-size: 24px;
        }
        .header p {
            color: #c9deff;
            margin: 8px 0 0;
            font-size: 14px;
        }
        .body {
            padding: 30px;
            color: #333333;
        }
        .body p {
            font-size: 15px;
            line-height: 1.6;
        }
        .password-box {
            background-color: #f0f4ff;
            border: 1px dashed #1a73e8;
            border-radius: 6px;
            text-align: center;
            padding: 16px;
            margin: 24px 0;
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #1a73e8;
        }
        .steps {
            background-color: #f9f9f9;
            border-radius: 6px;
            padding: 16px 20px;
            margin: 20px 0;
        }
        .steps p {
            margin: 0 0 8px;
            font-weight: bold;
            font-size: 14px;
            color: #555;
        }
        .steps ol {
            margin: 0;
            padding-left: 20px;
            font-size: 14px;
            color: #555;
            line-height: 1.8;
        }
        .warning {
            background-color: #fff8e1;
            border-left: 4px solid #f9a825;
            padding: 12px 16px;
            border-radius: 4px;
            font-size: 13px;
            color: #666;
        }
        .footer {
            background-color: #f4f4f4;
            text-align: center;
            padding: 16px;
            font-size: 12px;
            color: #999;
        }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            {% block header %}{% endblock %}
        </div>
        <div class="body">
            {% block content %}{% endblock %}
        </div>
        <div class="footer">
            © 2026 NexoTic · Este es un correo automático, por favor no respondas.
        </div>
    </div>
</body>
</html>
