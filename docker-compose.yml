services:
  db:
    image: postgres:18
    container_name: db
    
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "postgres"
      PGDATA: /var/lib/postgresql/data/pgdata

    volumes:
      - db_data:/var/lib/postgresql/data

    networks:
      - nexo_tic_network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: app
    
    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      PRODUCTION: "True"
      PG_DB: postgres
      PG_USER: postgres
      PG_PASS: postgres
      PG_HOST: db

    networks:
      - nexo_tic_network

    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - app

    networks:
      - nexo_tic_network

volumes:
  db_data:

networks:
  nexo_tic_network:
    driver: bridge
